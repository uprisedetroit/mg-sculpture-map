<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moross Greenway Sculpture Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --bg: #f4f3ef;
      --panel: #ffffff;
      --text: #222222;
      --muted: #6b7280;
      --border: rgba(0, 0, 0, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
      --green: #2e8b57;
      --purple: #7c3aed;
      --yellow: #eab308;
      --fallback: #94a3b8;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #eef2f5;
    }

    .map-header {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      max-width: min(360px, calc(100% - 32px));
      backdrop-filter: blur(8px);
    }

    .map-header h1 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.2;
    }

    .map-header p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #374151;
      background: #f9fafb;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: white;
      box-sizing: border-box;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      padding: 0;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content {
      margin: 0;
      width: min(320px, calc(100vw - 60px)) !important;
    }

    .leaflet-popup-tip {
      box-shadow: none;
    }

    .popup-card {
      background: var(--panel);
    }

    .popup-image-wrap {
      aspect-ratio: 4 / 3;
      background: #e5e7eb;
      overflow: hidden;
    }

    .popup-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .popup-body {
      padding: 14px 14px 16px;
    }

    .popup-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }

    .popup-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .popup-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .popup-label {
      font-weight: 700;
      color: #111827;
    }

    .popup-value {
      color: #374151;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
      background: #f8fafc;
      border: 1px solid rgba(0, 0, 0, 0.08);
      margin-bottom: 10px;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
    }

    .popup-notes {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      font-size: 13px;
      line-height: 1.55;
      color: #374151;
      white-space: pre-wrap;
    }

    .sculpture-marker {
      background: transparent;
      border: none;
    }

    .marker-frame {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--fallback);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      box-sizing: border-box;
    }

    .marker-img {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .marker-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f3f4f6, #dbe4ea);
      color: #475569;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      padding: 8px;
      box-sizing: border-box;
    }

    .leaflet-control-attribution {
      font-size: 11px;
    }

    .loading,
    .error-banner {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      font-size: 13px;
    }

    .error-banner {
      color: #991b1b;
      max-width: calc(100% - 32px);
      text-align: center;
      border-color: rgba(153, 27, 27, 0.18);
      display: none;
    }

    @media (max-width: 640px) {
      .map-header {
        top: 10px;
        left: 10px;
        right: 10px;
        max-width: none;
      }

      .marker-frame {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="map-header">
      <h1>Moross Greenway Sculpture Map</h1>
      <p>
        Explore sculptures along the greenway. Marker borders reflect each sculpture's current status,
        and clicking a marker opens details for the piece.
      </p>
      <div class="legend" aria-label="Status legend">
        <span class="legend-item"><span class="legend-swatch" style="border-color: var(--green);"></span>Permanent Collection</span>
        <span class="legend-item"><span class="legend-swatch" style="border-color: var(--purple);"></span>On Loan</span>
        <span class="legend-item"><span class="legend-swatch" style="border-color: var(--yellow);"></span>For Sale</span>
      </div>
    </div>

    <div id="map"></div>
    <div id="loading" class="loading">Loading sculptures…</div>
    <div id="error" class="error-banner"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRhDGUmzWZIB1Rx2Pm-6SW28ZJ8EQa1FeuemSO8mjMKg1p3RkrIQ0yNQTyeg1guzvTz95eIaPuz9Tvt/pub?gid=0&single=true&output=csv";

    const STATUS_STYLES = {
      "permanent collection": { color: "#2e8b57", label: "Permanent Collection" },
      "on loan": { color: "#7c3aed", label: "On Loan" },
      "for sale": { color: "#eab308", label: "For Sale" }
    };

    const map = L.map("map", {
      scrollWheelZoom: true,
      zoomControl: false
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 20,
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    const markersLayer = L.featureGroup().addTo(map);

    function normalize(value) {
      return String(value || "").trim();
    }

    function normalizeStatus(value) {
      return normalize(value).toLowerCase();
    }

    function getStatusStyle(status) {
      return STATUS_STYLES[normalizeStatus(status)] || { color: "#94a3b8", label: normalize(status) || "Unknown" };
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseCsvLine(line) {
      const cells = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          cells.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      cells.push(current);
      return cells;
    }

    function parseCsv(text) {
      const rows = [];
      const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).filter(Boolean);

      for (const line of lines) {
        rows.push(parseCsvLine(line));
      }

      return rows;
    }

    function parseLatLong(raw) {
      const value = normalize(raw);
      if (!value) return null;

      const cleaned = value
        .replace(/[()\[\]]/g, "")
        .replace(/\s+/g, " ")
        .trim();

      const matches = cleaned.match(/-?\d+(?:\.\d+)?/g);
      if (!matches || matches.length < 2) return null;

      const lat = parseFloat(matches[0]);
      const lng = parseFloat(matches[1]);

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;

      return [lat, lng];
    }

    function buildImageMarkup(imageUrl, altText) {
      const safeUrl = normalize(imageUrl);
      if (!safeUrl) {
        return '<div class="marker-fallback">No Image</div>';
      }
      return `<div class="marker-img" style="background-image:url('${escapeHtml(safeUrl)}');" role="img" aria-label="${escapeHtml(altText)}"></div>`;
    }

    function buildMarkerIcon(row) {
      const statusStyle = getStatusStyle(row.status);
      const title = row.sculpture_title || "Sculpture";
      const imageUrl = row.image_url || row.image_visualized;

      return L.divIcon({
        className: "sculpture-marker",
        html: `
          <div class="marker-frame" style="border-color: ${statusStyle.color};">
            ${buildImageMarkup(imageUrl, title)}
          </div>
        `,
        iconSize: [64, 64],
        iconAnchor: [32, 32],
        popupAnchor: [0, -26]
      });
    }

    function formatArtist(firstName, lastName) {
      return [normalize(firstName), normalize(lastName)].filter(Boolean).join(" ") || "Unknown artist";
    }

    function shouldShowPrice(status, price) {
      return normalizeStatus(status) === "for sale" && normalize(price);
    }

    function buildPopup(row) {
      const statusStyle = getStatusStyle(row.status);
      const title = row.sculpture_title || "Untitled Sculpture";
      const artist = formatArtist(row.artist_first_name, row.artist_last_name);
      const imageUrl = row.image_url || row.image_visualized;
      const notes = normalize(row.notes);
      const priceRow = shouldShowPrice(row.status, row.price)
        ? `<div class="popup-row"><span class="popup-label">Price:</span><span class="popup-value">${escapeHtml(row.price)}</span></div>`
        : "";

      return `
        <article class="popup-card">
          <div class="popup-image-wrap">
            ${imageUrl
              ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" loading="lazy" />`
              : `<div class="marker-fallback">No Image</div>`}
          </div>
          <div class="popup-body">
            <h2 class="popup-title">${escapeHtml(title)}</h2>
            <div class="status-chip" style="color:${statusStyle.color};">
              <span class="status-dot"></span>
              <span>${escapeHtml(statusStyle.label)}</span>
            </div>
            <div class="popup-meta">
              <div class="popup-row"><span class="popup-label">Artist:</span><span class="popup-value">${escapeHtml(artist)}</span></div>
              ${priceRow}
            </div>
            ${notes ? `<div class="popup-notes"><span class="popup-label">Notes:</span> ${escapeHtml(notes)}</div>` : ""}
          </div>
        </article>
      `;
    }

    function rowFromCells(cells) {
      return {
        sculpture_title: normalize(cells[0]),
        artist_first_name: normalize(cells[1]),
        artist_last_name: normalize(cells[2]),
        status: normalize(cells[3]),
        price: normalize(cells[4]),
        lat_long: normalize(cells[5]),
        image_visualized: normalize(cells[6]),
        image_url: normalize(cells[7]),
        notes: normalize(cells[8])
      };
    }

    function showError(message) {
      const banner = document.getElementById("error");
      banner.textContent = message;
      banner.style.display = "block";
    }

    function hideLoading() {
      const loading = document.getElementById("loading");
      if (loading) loading.style.display = "none";
    }

    async function loadMapData() {
      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) {
          throw new Error(`CSV request failed with status ${response.status}`);
        }

        const text = await response.text();
        const rows = parseCsv(text);

        if (!rows.length) {
          throw new Error("The CSV did not return any rows.");
        }

        const dataRows = rows.slice(1).map(rowFromCells);
        let validCount = 0;

        dataRows.forEach((row) => {
          const coords = parseLatLong(row.lat_long);
          if (!coords) return;

          const marker = L.marker(coords, { icon: buildMarkerIcon(row) });
          marker.bindPopup(buildPopup(row), {
            maxWidth: 340,
            className: "sculpture-popup"
          });
          marker.addTo(markersLayer);
          validCount += 1;
        });

        if (!validCount) {
          throw new Error("No valid sculpture coordinates were found in column F (lat_long).");
        }

        map.fitBounds(markersLayer.getBounds(), {
          padding: [40, 40],
          maxZoom: 18
        });
      } catch (error) {
        console.error(error);
        showError(`Could not load the sculpture map. ${error.message}`);
        map.setView([42.425, -82.91], 14);
      } finally {
        hideLoading();
        setTimeout(() => map.invalidateSize(), 150);
      }
    }

    loadMapData();
    window.addEventListener("resize", () => map.invalidateSize());
  </script>
</body>
</html>
