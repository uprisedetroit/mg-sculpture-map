<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Moross Greenway Sculptures</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body { height:100%; margin:0; }
    #leaflet-map { width:100%; height:100%; }

    .sculpture-popup .leaflet-popup-tip-container { display:none !important; }
    .sculpture-popup .leaflet-popup-content-wrapper {
      background:#fff; border-radius:14px; padding:0;
      box-shadow:0 12px 36px rgba(0,0,0,0.18); overflow:hidden; width:240px;
    }
    .sculpture-popup .leaflet-popup-content { margin:0; width:240px !important; }
    .sculpture-popup .leaflet-popup-close-button {
      color:#fff; font-size:20px; right:10px; top:8px; z-index:10;
      text-shadow:0 1px 3px rgba(0,0,0,0.5);
    }
    .popup-img { width:240px; height:160px; object-fit:cover; display:block; background:#eee; }
    .popup-no-img {
      width:240px; height:80px; background:#e8e8e8;
      display:flex; align-items:center; justify-content:center;
      color:#aaa; font-size:13px;
    }
    .popup-body { padding:12px 14px 14px; font-family:sans-serif; }
    .popup-title { font-size:14px; font-weight:600; color:#111; margin:0 0 3px; line-height:1.3; }
    .popup-artist { font-size:12px; color:#555; margin:0 0 8px; }
    .popup-badge {
      display:inline-block; font-size:11px; font-weight:600;
      padding:3px 8px; border-radius:999px; margin-bottom:6px;
    }
    .badge-permanent { background:#d4edda; color:#1a6630; }
    .badge-loan      { background:#e8d5f5; color:#5b2d8e; }
    .badge-sale      { background:#fff3cd; color:#7d5a00; }
    .badge-other     { background:#e9ecef; color:#444; }
    .popup-price { font-size:13px; font-weight:600; color:#333; margin:4px 0; }
    .popup-notes { font-size:12px; color:#666; margin:6px 0 0; line-height:1.5; }

    .legend {
      position:absolute; bottom:28px; left:12px; z-index:1000;
      background:rgba(255,255,255,0.95); border-radius:10px;
      padding:10px 14px; box-shadow:0 4px 16px rgba(0,0,0,0.13);
      font-size:12px; line-height:1.9; pointer-events:none; font-family:sans-serif;
    }
    .legend-row { display:flex; align-items:center; gap:8px; color:#333; }
    .legend-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
  </style>
</head>
<body>
  <div id="leaflet-map"></div>

  <div class="legend">
    <div class="legend-row"><div class="legend-dot" style="background:#22c55e;"></div>Permanent Collection</div>
    <div class="legend-row"><div class="legend-dot" style="background:#a855f7;"></div>On Loan</div>
    <div class="legend-row"><div class="legend-dot" style="background:#eab308;"></div>For Sale</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    var CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRhDGUmzWZIB1Rx2Pm-6SW28ZJ8EQa1FeuemSO8mjMKg1p3RkrIQ0yNQTyeg1guzvTz95eIaPuz9Tvt/pub?gid=0&single=true&output=csv";

    var map = L.map("leaflet-map", { scrollWheelZoom:true }).setView([42.38, -83.05], 14);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      subdomains:"abcd",
      maxZoom:20,
      attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Map tiles by <a href="https://carto.com/">CARTO</a>'
    }).addTo(map);

    window.addEventListener("resize", function(){ map.invalidateSize(); });
    setTimeout(function(){ map.invalidateSize(); }, 200);

    function strokeColor(status) {
      var s = (status || "").toLowerCase();
      if (s.indexOf("permanent") !== -1) return "#22c55e";
      if (s.indexOf("loan")      !== -1) return "#a855f7";
      if (s.indexOf("sale")      !== -1) return "#eab308";
      return "#94a3b8";
    }

    function badgeClass(status) {
      var s = (status || "").toLowerCase();
      if (s.indexOf("permanent") !== -1) return "badge-permanent";
      if (s.indexOf("loan")      !== -1) return "badge-loan";
      if (s.indexOf("sale")      !== -1) return "badge-sale";
      return "badge-other";
    }

    function buildIcon(imgUrl, status) {
      var color = strokeColor(status);
      var size = 52, b = 3, inner = size - b * 2;
      var src = (imgUrl || "").trim();
      var inner_html = src
        ? '<img src="' + src + '" width="' + inner + '" height="' + inner + '" style="object-fit:cover;display:block;">'
        : '<div style="width:' + inner + 'px;height:' + inner + 'px;background:#ddd;display:flex;align-items:center;justify-content:center;font-size:20px;">&#128511;</div>';
      return L.divIcon({
        className:"",
        html:'<div style="width:' + size + 'px;height:' + size + 'px;border:' + b + 'px solid ' + color + ';border-radius:6px;overflow:hidden;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,0.25);">' + inner_html + '</div>',
        iconSize:[size,size],
        iconAnchor:[size/2, size],
        popupAnchor:[0, -(size+4)]
      });
    }

    function buildPopup(r) {
      // a=0 title, b=1 first, c=2 last, d=3 status, e=4 price, f=5 latlong, g=6 ignore, h=7 image_url, i=8 notes
      var title  = (r[0] || "Untitled").trim();
      var artist = [(r[1]||"").trim(), (r[2]||"").trim()].filter(function(v){return v;}).join(" ") || "Unknown artist";
      var status = (r[3] || "").trim();
      var price  = (r[4] || "").trim();
      var img    = (r[7] || "").trim();
      var notes  = (r[8] || "").trim();

      var imgHtml = img
        ? '<img class="popup-img" src="' + img + '" alt="' + title + '">'
        : '<div class="popup-no-img">No image</div>';

      var priceHtml = (status.toLowerCase().indexOf("sale") !== -1 && price)
        ? '<div class="popup-price">' + price + '</div>' : "";

      var notesHtml = notes ? '<div class="popup-notes">' + notes + '</div>' : "";

      return imgHtml
        + '<div class="popup-body">'
        +   '<div class="popup-title">' + title + '</div>'
        +   '<div class="popup-artist">' + artist + '</div>'
        +   '<span class="popup-badge ' + badgeClass(status) + '">' + (status || "Unknown") + '</span>'
        +   priceHtml
        +   notesHtml
        + '</div>';
    }

    Papa.parse(CSV, {
      download:true,
      header:false,
      skipEmptyLines:true,
      complete:function(results) {
        var rows = results.data;
        if (!rows || rows.length < 2) return;
        var markers = [];
        for (var i = 1; i < rows.length; i++) {
          var r = rows[i];
          var latlong = (r[5] || "").trim();
          if (!latlong) continue;
          var parts = latlong.split(",");
          if (parts.length < 2) continue;
          var lat = parseFloat(parts[0]);
          var lng = parseFloat(parts[1]);
          if (!isFinite(lat) || !isFinite(lng)) continue;
          var m = L.marker([lat, lng], { icon: buildIcon(r[7], r[3]) });
          m.bindPopup(buildPopup(r), { className:"sculpture-popup", maxWidth:240, minWidth:240 });
          m.addTo(map);
          markers.push(m);
        }
        if (markers.length > 0) {
          map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2));
        }
        setTimeout(function(){ map.invalidateSize(); }, 200);
      }
    });
  </script>
</body>
</html>
